ا<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Reward</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
text-align:center;
transition:0.5s;
}

.container{
padding:30px;
}

h1{
font-size:45px;
margin-bottom:10px;
}

.points{
font-size:28px;
font-weight:bold;
margin:10px;
}

.level{
font-size:22px;
margin-bottom:20px;
color:#ffd700;
}

.progress{
width:80%;
height:25px;
background:#334155;
border-radius:20px;
margin:auto;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.5s;
}

.btn{
padding:15px 25px;
margin:10px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:18px;
color:white;
}

.camera{
background:#3b82f6;
}

.upload{
background:#10b981;
}

.dark{
background:black;
}

.report-box{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
width:300px;
margin:auto;
margin-top:20px;
}

.badges{
margin-top:20px;
font-size:25px;
}

.emoji{
font-size:50px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>🌱 Green Reward</h1>

<div class="emoji">😊</div>

<div class="points">
⭐ Points: <span id="points">0</span>
</div>

<div class="level">
🏆 Level: <span id="level">Bronze</span>
</div>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<br>

<button class="btn camera" onclick="cameraDetect()">
📷 Open Camera
</button>

<button class="btn upload" onclick="uploadDetect()">
📁 Upload Image
</button>

<button class="btn" onclick="toggleDark()">
🌙 Dark Mode
</button>

<div class="report-box">

<h3>📊 Reports Statistics</h3>

<p>
📢 Total Reports:
<span id="reports">0</span>
</p>

<p>
🎖️ Badge:
<span id="badge">Beginner</span>
</p>

</div>

<div class="badges" id="badges">
🏅
</div>

</div>

<audio id="successSound">
<source src="https://www.soundjay.com/human/cheering-01.mp3" type="audio/mpeg">
</audio>

<script>

let points=0;
let reports=0;

function updateUI(){

document.getElementById("points").innerText=points;
document.getElementById("reports").innerText=reports;

let level="Bronze";

if(points>=500)
level="Gold";
else if(points>=200)
level="Silver";

document.getElementById("level").innerText=level;

let progress=Math.min(points/500*100,100);

document.getElementById("bar").style.width=
progress+"%";

if(points>=500){
document.getElementById("badge").innerText="Eco Hero";
document.getElementById("badges").innerHTML="🥇🌍🏆";
}
else if(points>=200){
document.getElementById("badge").innerText="Cleaner";
document.getElementById("badges").innerHTML="🥈♻️";
}
else{
document.getElementById("badge").innerText="Beginner";
document.getElementById("badges").innerHTML="🏅";
}
}

function celebrate(){

document.getElementById("successSound").play();

alert("🎉 Waste Detected! +100 Points");
}

function cameraDetect(){

points+=100;
reports+=1;

celebrate();
updateUI();
}

function uploadDetect(){

points+=100;
reports+=1;

celebrate();
updateUI();
}

function toggleDark(){

document.body.classList.toggle("dark");
}

</script>

</body>
</html>
